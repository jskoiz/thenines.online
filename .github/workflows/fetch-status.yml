name: Fetch Status Data

on:
  schedule:
    - cron: '17 * * * *'   # every hour at :17 to avoid the top-of-hour rush
  workflow_dispatch:         # manual trigger

concurrency:
  group: fetch-status
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch and normalize status data
        run: node scripts/fetch-status.js

      - name: Smoke test
        run: node scripts/smoke-test.js

      - name: Commit if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/status.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update status data"
          git push
